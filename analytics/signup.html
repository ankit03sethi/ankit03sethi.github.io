<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Start your free trial &middot; cursive</title>
  <link rel="stylesheet" href="trial.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f6feb'/><text x='32' y='42' font-family='Arial' font-size='30' fill='white' text-anchor='middle' font-weight='700'>365</text></svg>" />
  <script src="/analytics.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">365</div>
      <div>
        <div class="brand-title">cursive</div>
        <div class="brand-sub">Free trial signup</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <div class="steps">
        <div class="step active" title="Sign up"></div>
        <div class="step" title="Verify"></div>
        <div class="step" title="Password"></div>
        <div class="step" title="Template"></div>
        <div class="step" title="Upload"></div>
      </div>
      <h1>Start your free trial</h1>
      <p class="lead">Enter your mobile and email to receive a one-time password.</p>

      <form id="signupForm" autocomplete="off">
        <label for="mobile">Mobile number</label>
        <input id="mobile" type="tel" required placeholder="e.g. 9876543210" />
        <div class="hint">Use the mobile number you registered with the marketplace.</div>

        <label for="email">Email address</label>
        <input id="email" type="email" required placeholder="you@example.com" />
        <div class="hint">We'll send your one-time password (OTP) here.</div>

        <div class="row">
          <button type="submit" class="btn btn-primary btn-block" id="continueBtn">Send OTP</button>
        </div>
        <p id="signupError" class="error hidden"></p>
      </form>

      <p class="foot">Already have an account? <a href="./">Sign in</a></p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="trial.js"></script>
  <script>
    (function () {
      var form = document.getElementById("signupForm");
      var btn  = document.getElementById("continueBtn");

      var s = Trial.state();
      if (s.mobile) document.getElementById("mobile").value = s.mobile;
      if (s.email)  document.getElementById("email").value = s.email;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        Trial.hideError("signupError");
        var mobile = document.getElementById("mobile").value.trim();
        var email  = document.getElementById("email").value.trim().toLowerCase();

        if (!Trial.isMobile(mobile)) {
          Trial.showError("signupError", "Please enter a valid mobile number.");
          return;
        }
        if (!Trial.isEmail(email)) {
          Trial.showError("signupError", "Please enter a valid email address.");
          return;
        }

        Trial.busy(btn, true);
        Trial.post("trial_signup", { mobile: Trial.normalizeMobile(mobile), email: email })
          .then(function (res) {
            Trial.busy(btn, false, "Send OTP");
            if (!res || res.ok !== true) {
              Trial.showError("signupError", (res && res.message) || "Could not send OTP. Please try again.");
              return;
            }
            Trial.save({
              mobile: Trial.normalizeMobile(mobile),
              email: email,
              otpSent: true,
              otpSentAt: Date.now()
            });
            location.href = "verify.html";
          })
          .catch(function (err) {
            Trial.busy(btn, false, "Send OTP");
            Trial.showError("signupError", "Could not reach the server: " + (err && err.message ? err.message : err));
          });
      });
    })();
  </script>

      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

  </div>

</body>
</html>
