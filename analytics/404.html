<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=/Analytics/" />
  <title>cursive Analytics</title>
  <script>
    // If GitHub Pages routes an unknown path under /Analytics back here,
    // bounce to the app entry point.
    if (location.pathname.toLowerCase().indexOf("/analytics") !== -1) {
      location.replace("/Analytics/");
    }
  </script>
</head>
<body>
  <p>Redirecting to <a href="/Analytics/">/Analytics</a>…</p>
</body>
</html>
