<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>cursive &mdash; Start. Track. Grow. Your e-commerce business.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f6feb'/><polyline points='10 46 24 30 34 40 54 18' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><polyline points='42 18 54 18 54 30' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="stylesheet" href="leads.css?v=2026052690" />
</head>
<body>

<header class="topbar">
  <a href="/leads01/" class="brand">
    <div class="brand-box" aria-label="cursive logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 17 9 11 13 15 21 6"/>
        <polyline points="15 6 21 6 21 12"/>
      </svg>
    </div>
    <div>
      <div class="brand-wordmark">cursive<sup>&reg;</sup></div>
      <div class="nav-sub">India's seller toolkit</div>
    </div>
  </a>
  <div class="topbar-right" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span id="totalPaidChip" class="hidden" style="background:#dcfce7;color:#065f46;padding:6px 14px;border-radius:20px;font-weight:700;font-size:13px;border:1px solid #86efac;" title="Total paid by customers in selected date range">💰 ₹0</span>
    <span id="emailChip" class="email-chip hidden"></span>
    <button id="signOutBtn" class="btn-ghost hidden" type="button">Sign out</button>
  </div>
</header>

<main id="loginView" class="auth-wrap hidden">
  <form id="loginForm" class="auth-card" autocomplete="on" novalidate>
    <h1>Sign in</h1>
    <p class="lede">Only whitelisted emails can view this page.</p>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" />
    <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
    <p id="loginError" class="error hidden"></p>
  </form>
</main>

<main id="dashView" class="dash hidden">
  <div class="toolbar">
    <input id="searchBox" class="search-box" type="search" placeholder="Search by email, mobile, invoice # or Razorpay ID..." autocomplete="off" />
    <button id="refreshBtn" class="btn-refresh" type="button">Refresh</button>
    <span class="last-refreshed" id="lastRefreshed"></span>
  </div>

  <div class="date-toolbar" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 0;font-size:13px;">
    <span style="font-weight:600;color:#334155;">📅 Date range:</span>
    <select id="dateRangePreset" style="padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;">
      <option value="all">All time</option>
      <option value="today">Today</option>
      <option value="yesterday">Yesterday</option>
      <option value="last7">Last 7 days</option>
      <option value="last30" selected>Last 30 days</option>
      <option value="thismonth">This month</option>
      <option value="lastmonth">Last month</option>
      <option value="custom">Custom range</option>
    </select>
    <input type="date" id="dateFrom" style="padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;display:none;" />
    <span id="dateSep" style="display:none;">to</span>
    <input type="date" id="dateTo" style="padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;display:none;" />
    <button id="dateApply" style="padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:none;">Apply</button>
    <span id="dateActiveRange" style="color:#64748b;font-size:12px;margin-left:auto;"></span>
  </div>

  <nav class="tabs top-tabs" id="topTabs">
    <button class="tab top-tab active" data-top="new">
      <span class="big-count" id="topcnt_new">0</span>
      <span class="stage-title">New leads</span>
    </button>
    <button class="tab top-tab" data-top="follow">
      <span class="big-count" id="topcnt_follow">0</span>
      <span class="stage-title">Follow ups</span>
    </button>
    <button class="tab top-tab" data-top="quotations">
      <span class="big-count" style="color:#7c3aed;">📋</span>
      <span class="stage-title">Quotations</span>
    </button>
    <button class="tab top-tab" data-top="done">
      <span class="big-count" id="topcnt_done">0</span>
      <span class="stage-title">Paid</span>
    </button>
  </nav>

  <nav class="tabs sub-tabs" id="subTabs"></nav>

  <div class="panel">
    <div id="paneStage" class="pane"></div>
    <div id="paneQuotations" class="pane hidden" style="padding:0;margin:0;">
      <iframe id="quotationsFrame" src="about:blank" style="width:100%;height:calc(100vh - 260px);min-height:600px;border:0;border-radius:8px;background:#fff;"></iframe>
    </div>
  </div>

  <p style="margin-top:18px;color:#94a3b8;font-size:11px;text-align:center;">
    Powered by Supabase Edge Functions &middot; All times in your local timezone.
  </p>
</main>

<script type="module" src="leads.js?v=2026070715"></script>
</body>
</html>
