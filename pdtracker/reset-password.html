<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Reset password &mdash; Cursive PD Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f6feb'/><polyline points='10 46 24 30 34 40 54 18' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><polyline points='42 18 54 18 54 30' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
<link rel="stylesheet" href="pdtracker.css?v=2026052703" />
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">
    <div class="brand-box" aria-label="cursive logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 17 9 11 13 15 21 6"/>
        <polyline points="15 6 21 6 21 12"/>
      </svg>
    </div>
    <div>
      <div class="brand-wordmark">cursive<sup>&reg;</sup><span class="tracker-badge">PD TRACKER</span></div>
      <div class="nav-sub">India's seller toolkit</div>
    </div>
  </a>
</header>

<main class="auth-wrap">
  <form id="resetForm" class="auth-card" novalidate>
    <h1>Set a new password</h1>
    <p class="lede">Choose a new password for your Cursive PD Tracker account.</p>

    <label for="newPassword">New password (6+ characters)</label>
    <input id="newPassword" type="password" minlength="6" required autocomplete="new-password" />

    <label for="confirmPassword">Confirm new password</label>
    <input id="confirmPassword" type="password" minlength="6" required autocomplete="new-password" />

    <button type="submit" id="resetBtn" class="btn-primary">Update password &rarr;</button>
    <p id="resetError" class="error hidden"></p>
    <p id="resetSuccess" class="success hidden"></p>

    <div class="auth-foot">
      <a href="/pdtracker/">&larr; Back to sign in</a>
    </div>
  </form>
</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm";

const SUPABASE_URL = "https://bttppihskbfmxwujyztj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0dHBwaWhza2JmbXh3dWp5enRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTk2OTksImV4cCI6MjA5NTI3NTY5OX0.HVy2iOv9t4u6vA2TaMolp2GOrvi-5m9pLW1lXKCnEl8";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, storageKey: "pd_tracker_auth", detectSessionInUrl: true },
});

const $ = (s) => document.querySelector(s);
const show = (el) => el && el.classList.remove("hidden");
const hide = (el) => el && el.classList.add("hidden");

// Supabase handles the recovery token automatically via detectSessionInUrl
// We just need to wait for the session to be picked up
let hasSession = false;
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  hasSession = !!session;
  if (!hasSession) {
    const err = $("#resetError");
    err.textContent = "Reset link expired or invalid. Request a new one.";
    show(err);
  }
}
checkSession();

$("#resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = $("#resetError"); const ok = $("#resetSuccess");
  hide(err); hide(ok);
  const pw = $("#newPassword").value;
  const cpw = $("#confirmPassword").value;
  if (pw.length < 6) { err.textContent = "Password must be at least 6 characters."; show(err); return; }
  if (pw !== cpw) { err.textContent = "Passwords don't match."; show(err); return; }

  const btn = $("#resetBtn");
  btn.disabled = true; btn.textContent = "Updating...";
  try {
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) throw error;
    ok.textContent = "Password updated! Redirecting to sign in...";
    show(ok);
    setTimeout(() => location.href = "/pdtracker/", 1500);
  } catch (e2) {
    err.textContent = e2.message;
    show(err);
    btn.disabled = false; btn.textContent = "Update password →";
  }
});
</script>
</body>
</html>
