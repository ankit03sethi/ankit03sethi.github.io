<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Verify email &mdash; Cursive PD Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f6feb'/><polyline points='10 46 24 30 34 40 54 18' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><polyline points='42 18 54 18 54 30' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="stylesheet" href="pdtracker.css?v=2026053002" />
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">
    <div class="brand-box" aria-label="cursive logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 17 9 11 13 15 21 6"/>
        <polyline points="15 6 21 6 21 12"/>
      </svg>
    </div>
    <div>
      <div class="brand-wordmark">cursive<sup>&reg;</sup></div>
      <div class="nav-sub">India's seller toolkit</div>
    </div>
  </a>
</header>

<main class="auth-wrap">
  <form id="verifyForm" class="auth-card" novalidate>
    <h1>Check your email</h1>
    <p class="lede">We sent a 6-digit code to <strong id="emailDisplay">your email</strong>. Enter it below.</p>

    <label for="otp">6-digit code</label>
    <input id="otp" name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code" placeholder="123456" style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700;" />

    <button type="submit" id="verifyBtn" class="btn-primary">Verify &rarr;</button>
    <p id="verifyError" class="error hidden"></p>
    <p id="verifySuccess" class="success hidden"></p>

    <div class="auth-foot" style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div>
        Didn't get it? <button type="button" id="resendBtn" style="background:none;border:none;color:#1f6feb;font-weight:700;cursor:pointer;text-decoration:underline;font-size:13px;padding:0;">Resend OTP</button>
        <span id="resendCooldown" style="color:#94a3b8;font-size:12px;margin-left:4px;"></span>
      </div>
      <p id="resendMsg" style="font-size:12px;margin:0;display:none;"></p>
      <div style="font-size:12px;color:#64748b;">Check spam if it doesn't arrive in 30 seconds &middot; <a href="/pdtracker/signup.html" style="color:#64748b;">Start over</a></div>
    </div>
  </form>
</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm";
const SUPABASE_URL = "https://bttppihskbfmxwujyztj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ooT6WLYpHh6NOVWJBH7ECw_E78_gwqQ";

const $ = (s) => document.querySelector(s);
const email = sessionStorage.getItem("pd_signup_email");
if (!email) location.href = "/pdtracker/signup.html";
$("#emailDisplay").textContent = email;

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: "pd_tracker_auth" } });

$("#verifyForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = $("#verifyError"); const ok = $("#verifySuccess");
  err.classList.add("hidden"); ok.classList.add("hidden");
  const btn = $("#verifyBtn");
  btn.disabled = true; btn.textContent = "Verifying...";
  try {
    const otp = $("#otp").value.trim();
    if (!/^\d{6}$/.test(otp)) throw new Error("Enter the 6-digit code");

    const r = await fetch(SUPABASE_URL + "/functions/v1/analytics-otp-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, otp }),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.message || "Verification failed");

    // Auto sign-in via Supabase Auth using the password stashed by signup.html
    ok.textContent = "Verified! Signing you in...";
    ok.classList.remove("hidden");
    const pw = sessionStorage.getItem("pd_signup_password");
    if (pw) {
      const { error: sErr } = await sb.auth.signInWithPassword({ email, password: pw });
      sessionStorage.removeItem("pd_signup_email");
      sessionStorage.removeItem("pd_signup_password");
      if (sErr) {
        // Fall back to home (login form) if auto-signin fails
        setTimeout(() => location.href = "/home/?welcome=1", 1200);
        return;
      }
      // Logged in — land on /home/ (services hub + wallet) instead of upload page
      setTimeout(() => location.href = "/home/?welcome=1", 800);
    } else {
      sessionStorage.removeItem("pd_signup_email");
      setTimeout(() => location.href = "/home/?welcome=1", 1200);
    }
  } catch (e2) {
    err.textContent = e2.message;
    err.classList.remove("hidden");
    btn.disabled = false; btn.textContent = "Verify →";
  }
});

// Auto-submit when 6 digits typed
$("#otp").addEventListener("input", (e) => {
  if (/^\d{6}$/.test(e.target.value)) $("#verifyBtn").click();
});

// === Resend OTP with 30s cooldown ===
const resendBtn = $("#resendBtn");
const resendCd  = $("#resendCooldown");
const resendMsg = $("#resendMsg");
let _resendTimer = null;

function startResendCooldown(sec) {
  resendBtn.disabled = true;
  resendBtn.style.opacity = "0.5";
  resendBtn.style.cursor = "not-allowed";
  let left = sec;
  resendCd.textContent = `(${left}s)`;
  clearInterval(_resendTimer);
  _resendTimer = setInterval(() => {
    left--;
    if (left <= 0) {
      clearInterval(_resendTimer);
      resendCd.textContent = "";
      resendBtn.disabled = false;
      resendBtn.style.opacity = "1";
      resendBtn.style.cursor = "pointer";
    } else {
      resendCd.textContent = `(${left}s)`;
    }
  }, 1000);
}

resendBtn.addEventListener("click", async () => {
  resendMsg.style.display = "none";
  resendBtn.disabled = true;
  resendBtn.textContent = "Sending...";
  try {
    const r = await fetch(SUPABASE_URL + "/functions/v1/analytics-resend-signup-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ email }),
    });
    const j = await r.json();
    resendBtn.textContent = "Resend OTP";
    if (j.ok) {
      resendMsg.textContent = "✓ Fresh OTP sent. Check your inbox.";
      resendMsg.style.color = "#16a34a";
      resendMsg.style.display = "block";
      startResendCooldown(30);
    } else {
      resendMsg.textContent = j.message || "Could not resend.";
      resendMsg.style.color = "#dc2626";
      resendMsg.style.display = "block";
      resendBtn.disabled = false;
    }
  } catch (e) {
    resendMsg.textContent = "Network error: " + e.message;
    resendMsg.style.color = "#dc2626";
    resendMsg.style.display = "block";
    resendBtn.textContent = "Resend OTP";
    resendBtn.disabled = false;
  }
});
// Start with a 30s cooldown so users can't spam on arrival
startResendCooldown(30);
</script>
</body>
</html>
