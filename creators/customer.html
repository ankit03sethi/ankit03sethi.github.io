<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Seller Dashboard &mdash; cursive Creators</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f6feb'/><polyline points='10 46 24 30 34 40 54 18' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/><polyline points='42 18 54 18 54 30' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
<style>
  *{box-sizing:border-box;}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#0f172a;background:#eff6ff;min-height:100vh;}
  .brand-wordmark{font-family:'Dancing Script',cursive;font-weight:700;color:#1f6feb;line-height:0.9;}
  .brand-wordmark sup{font-family:system-ui,sans-serif;font-size:0.22em;opacity:0.5;font-weight:400;margin-left:1px;vertical-align:super;}
  .brand-logo-box{width:44px;height:44px;background:#1f6feb;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;max-width:1100px;margin:0 auto;background:#fff;border-bottom:1px solid #dbeafe;}
  .nav-brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;}
  .nav-brand .nav-title{font-size:36px !important;}
  .nav-sub{font-size:12px;color:#64748b;margin-top:2px;}
  .topright{display:flex;align-items:center;gap:10px;}
  .signout{background:none;border:1.5px solid #e2e8f0;color:#475569;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .wrap{max-width:880px;margin:30px auto;padding:0 22px;}
  .card{background:#fff;border-radius:16px;padding:26px;box-shadow:0 6px 24px rgba(15,23,42,.06);margin-bottom:18px;}
  h1{font-size:24px;margin:0 0 8px;font-weight:800;}
  .auth-card{max-width:440px;margin:50px auto;}
  .tab-bar{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:22px;}
  .tab-btn{flex:1;padding:10px;border:none;background:transparent;font-size:13px;font-weight:700;color:#64748b;border-radius:9px;cursor:pointer;}
  .tab-btn.active{background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  label{display:block;font-size:13px;font-weight:600;color:#334155;margin:14px 0 6px;}
  input{width:100%;padding:11px 13px;font-size:14px;border:1.5px solid #e2e8f0;border-radius:9px;background:#fff;color:#0f172a;font-family:inherit;}
  input:focus{outline:none;border-color:#1f6feb;box-shadow:0 0 0 3px rgba(31,111,235,.12);}
  .btn-primary{display:block;width:100%;padding:13px 22px;font-size:15px;font-weight:700;border:none;border-radius:10px;background:#1f6feb;color:#fff;cursor:pointer;margin-top:22px;}
  .btn-primary:hover{background:#1858d6;}
  .btn-primary:disabled{background:#cbd5e1;}
  .err{background:#fee2e2;color:#991b1b;padding:10px 12px;border-radius:8px;font-size:13px;margin-top:14px;display:none;}
  .err.show{display:block;}
  .hidden{display:none !important;}
  .new-job-btn{background:#1f6feb;color:#fff;padding:11px 22px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;display:inline-block;}
  .new-job-btn:hover{background:#1858d6;}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
  th{text-align:left;padding:10px 12px;background:#f8fafc;color:#475569;font-weight:600;border-bottom:1px solid #e2e8f0;}
  td{padding:11px 12px;border-bottom:1px solid #f1f5f9;}
  .status-pill{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px;}
  .pill-pending{background:#fef3c7;color:#92400e;}
  .pill-open{background:#dbeafe;color:#1e40af;}
  .pill-filled{background:#dcfce7;color:#14532d;}
  .pill-refunded{background:#fee2e2;color:#991b1b;}
  .empty{text-align:center;color:#94a3b8;padding:40px 20px;}
  .empty-emoji{font-size:48px;line-height:1;margin-bottom:10px;}
  .small-note{font-size:11px;color:#94a3b8;text-align:center;margin-top:18px;line-height:1.55;}
  .small-note a{color:#1f6feb;text-decoration:none;}
</style>
</head>
<body>

<nav class="nav">
  <a href="/creators/" class="nav-brand">
    <div class="brand-logo-box">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 17 9 11 13 15 21 6"/><polyline points="15 6 21 6 21 12"/>
      </svg>
    </div>
    <div>
      <div class="nav-title brand-wordmark">cursive<sup>&reg;</sup></div>
      <div class="nav-sub">Seller dashboard</div>
    </div>
  </a>
  <div class="topright">
    <span id="emailChip" style="font-size:13px;color:#475569;" class="hidden"></span>
    <button id="signOutBtn" class="signout hidden" type="button">Sign out</button>
  </div>
</nav>

<main class="wrap">
  <!-- AUTH -->
  <div id="authView" class="card auth-card hidden">
    <h1 id="authTitle">Sign in to post a job</h1>
    <div class="tab-bar">
      <button class="tab-btn active" id="tSignin" type="button">Sign in</button>
      <button class="tab-btn" id="tSignup" type="button">Create account</button>
    </div>

    <form id="signinForm" autocomplete="on">
      <label>Email</label>
      <input id="siEmail" type="email" required autocomplete="email" />
      <label>Password</label>
      <input id="siPassword" type="password" required autocomplete="current-password" />
      <button class="btn-primary" id="siBtn" type="submit">Sign in &rarr;</button>
      <div id="siErr" class="err"></div>
    </form>

    <form id="signupForm" class="hidden" autocomplete="on">
      <label>Your name</label>
      <input id="suName" type="text" required />
      <label>Email</label>
      <input id="suEmail" type="email" required autocomplete="email" />
      <label>Mobile</label>
      <input id="suMobile" type="tel" required />
      <label>Password</label>
      <input id="suPassword" type="password" required minlength="6" autocomplete="new-password" />
      <button class="btn-primary" id="suBtn" type="submit">Create account &rarr;</button>
      <div id="suErr" class="err"></div>
    </form>

    <div class="small-note">
      Are you a creator instead? <a href="/creators/join.html">Switch &rarr;</a>
    </div>
  </div>

  <!-- DASH -->
  <div id="dashView" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;">
        <h1>Your video jobs</h1>
        <a href="/creators/post-job.html" class="new-job-btn">+ Post a new job</a>
      </div>
      <div id="jobsContainer"></div>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";
  const sb = createClient(
    "https://bttppihskbfmxwujyztj.supabase.co",
    "sb_publishable_ooT6WLYpHh6NOVWJBH7ECw_E78_gwqQ",
    { auth: { persistSession: true, storageKey: "cc_customer_auth" } }
  );

  const $ = s => document.querySelector(s);

  function showErr(el, msg) { el.textContent = msg; el.classList.add("show"); }
  function clearErr(el) { el.classList.remove("show"); }

  $("#tSignin").addEventListener("click", () => {
    $("#tSignin").classList.add("active"); $("#tSignup").classList.remove("active");
    $("#signinForm").classList.remove("hidden"); $("#signupForm").classList.add("hidden");
    $("#authTitle").textContent = "Sign in to post a job";
  });
  $("#tSignup").addEventListener("click", () => {
    $("#tSignup").classList.add("active"); $("#tSignin").classList.remove("active");
    $("#signupForm").classList.remove("hidden"); $("#signinForm").classList.add("hidden");
    $("#authTitle").textContent = "Create your seller account";
  });

  $("#signinForm").addEventListener("submit", async (e) => {
    e.preventDefault(); clearErr($("#siErr"));
    const btn = $("#siBtn"); btn.disabled = true; btn.textContent = "Signing in...";
    const { error } = await sb.auth.signInWithPassword({ email: $("#siEmail").value.trim().toLowerCase(), password: $("#siPassword").value });
    if (error) { showErr($("#siErr"), error.message); btn.disabled = false; btn.textContent = "Sign in →"; return; }
    location.reload();
  });

  $("#signupForm").addEventListener("submit", async (e) => {
    e.preventDefault(); clearErr($("#suErr"));
    const btn = $("#suBtn"); btn.disabled = true; btn.textContent = "Creating...";
    const name = $("#suName").value.trim();
    const email = $("#suEmail").value.trim().toLowerCase();
    const mobile = $("#suMobile").value.trim();
    const password = $("#suPassword").value;
    const { error } = await sb.auth.signUp({ email, password, options: { data: { display_name: name, mobile, role: "seller" } } });
    if (error) { showErr($("#suErr"), error.message); btn.disabled = false; btn.textContent = "Create account →"; return; }
    location.reload();
  });

  function renderJobs(jobs) {
    const c = $("#jobsContainer");
    if (!jobs || jobs.length === 0) {
      c.innerHTML = '<div class="empty"><div class="empty-emoji">🎬</div><div><b>No jobs yet</b></div><div style="font-size:13px;margin-top:6px;">Post your first video job to get YouTubers making content about your product.</div></div>';
      return;
    }
    let html = '<table><thead><tr><th>Job</th><th>Category</th><th>Quantity</th><th>Total</th><th>Status</th><th>Filled</th><th>Created</th></tr></thead><tbody>';
    for (const j of jobs) {
      const totalQty = (j.cc_job_lines || []).reduce((s, l) => s + l.quantity, 0);
      const filledQty = (j.cc_job_lines || []).reduce((s, l) => s + l.filled_count, 0);
      const cls = j.status === "filled" ? "pill-filled" : j.status === "open" || j.status === "partially_filled" ? "pill-open" : j.status === "refunded" ? "pill-refunded" : "pill-pending";
      html += `<tr>
        <td>#${j.id}<br/><span style="font-size:11px;color:#94a3b8;">${j.product_name||"—"}</span></td>
        <td style="font-size:12px;color:#475569;">${j.category_slug}</td>
        <td>${totalQty} video${totalQty===1?"":"s"}</td>
        <td>₹${(j.total_paise/100).toLocaleString("en-IN")}</td>
        <td><span class="status-pill ${cls}">${j.status.replace("_"," ")}</span></td>
        <td>${filledQty}/${totalQty}</td>
        <td style="font-size:12px;color:#94a3b8;">${new Date(j.created_at).toLocaleDateString()}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    c.innerHTML = html;
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { $("#authView").classList.remove("hidden"); return; }

    $("#dashView").classList.remove("hidden");
    $("#emailChip").classList.remove("hidden");
    $("#emailChip").textContent = session.user.email;
    $("#signOutBtn").classList.remove("hidden");
    $("#signOutBtn").addEventListener("click", async () => { await sb.auth.signOut(); location.reload(); });

    const { data: jobs } = await sb.from("cc_jobs").select("*, cc_job_lines(*)").order("created_at", { ascending: false });
    renderJobs(jobs);
  })();
</script>
</body>
</html>
