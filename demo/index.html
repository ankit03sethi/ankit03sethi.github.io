<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading demo · Cursive</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .wrap { max-width: 440px; width: 100%; background: #fff; border-radius: 14px; padding: 40px 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; }
    .logo-box { width: 60px; height: 60px; background: #1f6feb; border-radius: 14px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
    .logo-box svg { width: 34px; height: 34px; }
    h1 { font-family: 'Dancing Script', cursive; font-size: 40px; color: #1f6feb; font-weight: 700; margin: 0 0 4px; line-height: 1; }
    .sub { color: #64748b; font-size: 13px; margin: 0 0 26px; }
    .badge { display: inline-block; background: #fef3c7; color: #92400e; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.4px; }
    .status { color: #475467; font-size: 14px; margin: 0 0 18px; line-height: 1.6; }
    .spinner { width: 38px; height: 38px; border: 4px solid #e2e8f0; border-top-color: #1f6feb; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 8px auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 10px; text-align: left; }
    .retry-btn { background: #1f6feb; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 10px; }
    .link-fallback { color: #1f6feb; text-decoration: none; font-size: 13px; font-weight: 600; display: inline-block; margin-top: 12px; }
    @font-face { font-family: 'Dancing Script'; src: local('Dancing Script'); font-display: swap; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="wrap">
  <div class="logo-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 17 9 11 13 15 21 6"/>
      <polyline points="15 6 21 6 21 12"/>
    </svg>
  </div>
  <h1>cursive</h1>
  <p class="sub">India's seller toolkit</p>

  <div class="badge">🎬 DEMO ACCESS</div>

  <div id="loading">
    <div class="spinner"></div>
    <p class="status"><b>Loading your demo dashboard...</b><br>Signing you in automatically.</p>
  </div>

  <div id="error" style="display:none;">
    <p class="status">Could not load the demo right now.</p>
    <div id="errMsg" class="err"></div>
    <button class="retry-btn" onclick="location.reload();">Try again</button>
    <br>
    <a class="link-fallback" href="/home/">Go to home page →</a>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm";

const SUPABASE_URL = "https://bttppihskbfmxwujyztj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0dHBwaWhza2JmbXh3dWp5enRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTk2OTksImV4cCI6MjA5NTI3NTY5OX0.HVy2iOv9t4u6vA2TaMolp2GOrvi-5m9pLW1lXKCnEl8";

// Demo account credentials (safe to expose — account is locked to demo mode by DB triggers + edge function checks)
const DEMO_EMAIL = "rahul@cursive.world";
const DEMO_PWD = "R@123";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: "pd_tracker_auth" } });

(async () => {
  try {
    // Always sign out any existing session first so the customer sees a clean demo
    // (in case they were previously signed in with their own account)
    try { await sb.auth.signOut(); } catch (e) {}

    // Clear any leftover demo state from previous visits (per-browser localStorage)
    try { localStorage.removeItem("cw_demo_state_v1"); } catch (e) {}
    try { localStorage.removeItem("cw_cart_v1"); } catch (e) {} // clear cart too

    // Sign in as demo
    const { data, error } = await sb.auth.signInWithPassword({ email: DEMO_EMAIL, password: DEMO_PWD });
    if (error) throw new Error(error.message || "Sign-in failed");
    if (!data || !data.session) throw new Error("No session returned");

    // Success! Redirect to home dashboard
    location.replace("/home/");
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("errMsg").textContent = e.message || "Unknown error";
  }
})();
</script>

</body>
</html>
